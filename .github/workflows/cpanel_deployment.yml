name: 🚀 Deploy Laravel (SSH)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY_PRIVATE }}
          port: 2223
          script: |
            cd ~/public_html/domains/sibk-latansacendekia.my.id

            echo "📦 Pull latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main

            echo "🧰 Install Composer dependencies..."
            ~/bin/composer install --no-dev --optimize-autoloader

            echo "📦 Install npm dependencies..."
            ~/.nvm/versions/node/v24.3.0/bin/npm ci

            echo "🧩 Build Filament assets..."
            ~/.nvm/versions/node/v24.3.0/bin/npm run build:filament

            echo "🚀 Run Laravel optimizations..."
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "✅ Deploy finished!"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
