name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, bcmath, soap, gd, zip

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Deploy via LFTP Script
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          
          # Buat file script secara aman tanpa masalah karakter unik pada password
          cat <<EOF > deploy_script.lftp
          set ftp:ssl-allow true
          set ssl:verify-certificate false
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER"
          mirror -R --verbose \
            --exclude-glob .git \
            --exclude-glob .github \
            --exclude node_modules/ \
            --exclude tests/ \
            . sibk-latansacendekia.my.id/
          quit
          EOF
          
          # Eksekusi deployment
          lftp -f deploy_script.lftp
