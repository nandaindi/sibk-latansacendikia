name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, bcmath, soap, gd, zip

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow no;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            mirror -R --verbose --ignore-time --delete \
              --exclude-glob .git \
              --exclude-glob .gitignore \
              --exclude-glob .gitattributes \
              --exclude node_modules/ \
              --exclude tests/ \
              --exclude .editorconfig \
              --exclude .env.example \
              --exclude README.md \
              --exclude phpunit.xml \
              --exclude vite.config.js \
              --exclude tailwind.config.js \
              --exclude postcss.config.js \
              . /home/kure8737/sibk-latansacendekia.my.id/;
            quit
          "
